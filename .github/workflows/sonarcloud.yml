name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - version2
  pull_request:
    branches:
      - main

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
   
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0


      - name: Setup PHP
        uses: shivammathur/setup-php@c541c155eee45413f5b09a52248675b1a2575231  # v2.31.1
        with:
          php-version: '8.2'
          extensions: mbstring, intl, pdo_mysql, xml, json, tokenizer
          tools: composer


      - name: Setup Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b  # v4.0.1
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        run: |
          cd backend
          composer install --no-interaction --prefer-dist --no-progress
          cp .env.example .env || true
          php artisan key:generate

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci --ignore-scripts --frozen-lockfile
          npm cache clean --force

      - name: Build Frontend
        run: |
          cd frontend
          npm run build || true


      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f  # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_CLOUD }}
        with:
          args: >
            -Dsonar.organization=Asmae884
            -Dsonar.projectKey=Asmae884_projecthub
            -Dsonar.sources=backend/app,frontend/src
            -Dsonar.exclusions=**/vendor/**,**/node_modules/**,**/tests/**,**/storage/**,**/build/**
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=600
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.branch.target=main
